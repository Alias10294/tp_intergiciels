# Ligne pré-existante
spring.application.name=client-cross-db

# Configuration de la connexion PostgreSQL (Docker)
spring.datasource.url=jdbc:postgresql://localhost:5433/messagerie_db
spring.datasource.username=user_tp
spring.datasource.password=password_tp
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# On indique à Hibernate de créer ou mettre à jour automatiquement les tables existantes et manquantes (créées par le init.sql)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Configuration pour se connecter à Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=group_db_service