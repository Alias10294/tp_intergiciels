---
version: '3.8'

services:
  # --- INFRASTRUCTURE KAFKA ---
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://localhost:9092'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'

  # --- BASE DE DONNÉES POSTGRESQL ---
  db:
    image: postgres:15-alpine
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: user_tp
      POSTGRES_PASSWORD: password_tp
      POSTGRES_DB: messagerie_db
    ports:
      - "5432:5432"
    volumes:
      # Optionnel : pour initialiser tes tables au démarrage
      - ./infrastructure/init.sql:/docker-entrypoint-initdb.d/init.sql

  # --- SERVICE DE TRADUCTION ---
  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: libretranslate
    restart: always
    ports:
      - "5000:5000"
    environment:
      # On limite aux langues demandées dans le TP pour gagner du temps au chargement
      LT_LOAD_ONLY: "en,fr" 
      LT_UPDATE_MODELS: "true"
