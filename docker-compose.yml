---
version: '3.8'

services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'

      KAFKA_LISTENERS: 'INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka:29092,EXTERNAL://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'

      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'

  db:
    image: postgres:15-alpine
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: user_tp
      POSTGRES_PASSWORD: password_tp
      POSTGRES_DB: messagerie_db
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  client-cons-db:
    build:
      context: ./client-cons-db
      dockerfile: Dockerfile
    container_name: client-cons-db-service
    restart: always
    ports:
      - "8080:8080"
    environment:
      # On surcharge les variables pour que Java parle au réseau interne de Docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/messagerie_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      - db
      - kafka

  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: libretranslate
    restart: always
    ports:
      - "5000:5000"
    environment:
      LT_LOAD_ONLY: "en,fr"
      LT_UPDATE_MODELS: "true"

  per-translate-service:
    build:
      context: ./per-translate-service
      dockerfile: Dockerfile
    container_name: per-translate-service
    restart: always
    depends_on:
      - kafka
      - libretranslate
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APPLICATION_TOPICOUT: topicout
      APPLICATION_TOPICIN: topicin
      LIBRETRANSLATE_URL: http://libretranslate:5000/translate
      LIBRETRANSLATE_SOURCE: auto
      LIBRETRANSLATE_TARGET: fr
      LIBRETRANSLATE_FORMAT: text

volumes:
  postgres-data: